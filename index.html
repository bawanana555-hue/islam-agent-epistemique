<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Islam Agent Épistémique</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lato:wght@300;400;700&display=swap');

        :root {
            --bg-main: #FFEFD5;
            --orange-creme: #FFF5E1;
            --orange-clair: #FFB347;
            --orange-fonce: #E67E22;
            --vert-clair: #2ECC71;
            --bleu-ciel: #87CEEB;
            --text-main: #2C3E50;
            --bordure-vert: 2px solid var(--vert-clair);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body { 
            background: var(--bg-main); 
            font-family: 'Lato', sans-serif; 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            overflow: hidden; 
        }

        /* --- Header & Accueil --- */
        .header { 
            position: fixed; top: 0; left: 0; right: 0; 
            background: var(--bg-main); padding: 15px 10px; 
            z-index: 100; text-align: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .header-row { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 600px; margin: 0 auto; }
        
        .welcome-area { margin-top: 10px; }
        .welcome-area h1 { font-family: 'Amiri', serif; color: #3498DB; font-size: 1.4em; }
        .welcome-area .sub1 { color: #8E44AD; font-size: 1.1em; font-weight: bold; margin-top: 5px; }
        .welcome-area .sub2 { color: #16A085; font-size: 0.9em; font-style: italic; margin-top: 3px; }

        /* --- Chat --- */
        .chat-container { 
            flex: 1; margin-top: 160px; padding: 20px 15px 180px; 
            overflow-y: auto; display: flex; flex-direction: column; 
        }

        .msg { 
            max-width: 85%; margin-bottom: 20px; padding: 16px; 
            border-radius: 18px; font-size: 16px; line-height: 1.6;
            border: var(--bordure-vert);
            background: var(--orange-creme);
            box-shadow: 2px 4px 15px rgba(0,0,0,0.05);
        }

        .user-msg { align-self: flex-end; border-bottom-right-radius: 2px; border-color: var(--orange-clair); }
        .bot-msg { align-self: flex-start; border-bottom-left-radius: 2px; }

        /* --- Styles de lecture fascinante (Markdown) --- */
        .bot-msg p { margin-bottom: 15px; text-align: justify; }
        .bot-msg h1, .bot-msg h2 { 
            color: var(--vert-clair); 
            border-bottom: 3px solid var(--orange-fonce);
            margin: 15px 0 10px 0;
            font-family: 'Amiri', serif;
        }
        .bot-msg h1 { font-size: 1.5em; }
        .bot-msg h2 { font-size: 1.2em; }
        
        .bot-msg blockquote {
            border-left: 5px solid var(--bleu-ciel);
            padding-left: 15px;
            margin: 15px 0;
            background: rgba(135, 206, 235, 0.1);
            font-style: italic;
        }

        /* --- Indicateur de chargement --- */
        .typing { display: none; align-self: flex-start; padding: 10px; margin-bottom: 15px; }
        .dot { width: 10px; height: 10px; margin: 0 4px; border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(1) { background: #E74C3C; animation-delay: -0.32s; }
        .dot:nth-child(2) { background: #F1C40F; animation-delay: -0.16s; }
        .dot:nth-child(3) { background: #2ECC71; }

        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* --- Banner Dons Clignotants --- */
        .donation-banner { text-align: center; font-size: 0.85em; font-weight: bold; height: 20px; margin-bottom: 5px; }
        .blink { animation: blinker 4s linear infinite; }
        @keyframes blinker { 0% { opacity: 0; color: var(--orange-fonce); } 50% { opacity: 1; color: var(--vert-clair); } 100% { opacity: 0; color: var(--orange-fonce); } }

        /* --- Zone de Saisie --- */
        .input-wrapper { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-main); padding: 10px 15px 25px; }
        .input-area { 
            display: flex; background: var(--orange-creme); 
            border: var(--bordure-vert); border-radius: 30px; 
            padding: 8px; max-width: 600px; margin: 0 auto; 
        }
        .input-area input { flex: 1; border: none; background: transparent; outline: none; padding: 10px; font-size: 16px; color: var(--text-main); }
        .send-btn { background: var(--vert-clair); border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* --- Modals --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; }
        .button-oval { padding: 8px 15px; border-radius: 20px; border: none; color: white; font-weight: bold; cursor: pointer; }

        /* Mode "Lecture Libre" */
        .reading-mode .header { opacity: 0; pointer-events: none; transform: translateY(-20px); }
        .reading-mode .chat-container { margin-top: 20px; }
    </style>
</head>
<body>

<div class="header" id="main-header">
    <div class="header-row">
        <button onclick="toggleModal('modal-dons', true)" class="button-oval" style="background:var(--vert-clair)">DONS</button>
        <div style="width:50px; height:50px; border:2px solid var(--vert-clair); border-radius:10px; background:white; overflow:hidden">
            <img src="icons/icon-192.png" alt="Logo" style="width:100%; height:100%; object-fit:cover">
        </div>
        <button onclick="toggleModal('modal-profil', true)" class="button-oval" style="background:var(--orange-clair)">PROFIL</button>
    </div>
    <div class="welcome-area">
        <h1>Islam Agent Épistémique</h1>
        <div class="sub1">Bienvenue sur les pages de la théologie islamique</div>
        <div class="sub2">Je suis votre Premier Agent Épistémique d'Afrique pour l'islam</div>
    </div>
</div>

<div class="chat-container" id="chat"></div>

<div class="typing" id="loader">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
</div>

<div class="input-wrapper">
    <div class="donation-banner" id="don-text">
        <span class="blink" id="blink-msg">Soutenir la connaissance est une aumône continue...</span>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Posez votre question ici..." onfocus="setReadingMode(true)">
        <button class="send-btn" onclick="handleChat()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<div id="modal-profil" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--vert-clair)">👤 Votre Profil</h2>
        <input type="password" id="user-api-key" placeholder="Clé API Gemini (Obligatoire)" style="width:100%; padding:10px; margin:10px 0;">
        <button onclick="saveProfile()" style="background:var(--vert-clair); color:white; border:none; width:100%; padding:10px; border-radius:5px; cursor:pointer">ENREGISTRER</button>
        <button onclick="toggleModal('modal-profil', false)" style="background:#eee; border:none; width:100%; padding:10px; margin-top:5px; border-radius:5px;">FERMER</button>
    </div>
</div>

<div id="modal-dons" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--vert-clair)">💳 Soutenir l'Agent</h2>
        <p style="font-size:0.9em; margin:10px 0;">T-Money (Togo) : +228 90 XX XX XX</p>
        <button onclick="toggleModal('modal-dons', false)" style="background:var(--orange-fonce); color:white; border:none; width:100%; padding:10px; border-radius:5px;">FERMER</button>
    </div>
</div>

<script>
    const SYSTEM_INSTRUCTION = "Vous êtes l'Islam Agent Épistémique d'Afrique. Votre mission est de transmettre la profondeur et la rigueur de la théologie islamique. Méthodologie : Citez vos sources, soyez clair et concis. Ton : Noble, pédagogue. Si on vous interroge sur la politique menant à la violence, répondez : 'Je ne suis pas fait pour ça. Car ma compétence n'a aucun lien avec ce monde'. Utilisez obligatoirement des titres (#) et sous-titres (##).";

    const blinkMessages = ["Soutenir la connaissance est une aumône continue...", "Contribuez à l'éveil de l'Agent par vos dons volontaires."];
    let msgIdx = 0;
    setInterval(() => { msgIdx = (msgIdx + 1) % blinkMessages.length; document.getElementById('blink-msg').innerText = blinkMessages[msgIdx]; }, 4000);

    function setReadingMode(active) { if(active) document.body.classList.add('reading-mode'); }
    function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
    function saveProfile() { localStorage.setItem('iae_key', document.getElementById('user-api-key').value); alert("Clé enregistrée !"); toggleModal('modal-profil', false); }

    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('iae_history') || '[]');
        history.forEach(m => addMsg(m.text, m.side, false));
    }

    function saveToHistory(text, side) {
        let history = JSON.parse(localStorage.getItem('iae_history') || '[]');
        history.push({text, side});
        if(history.length > 20) history.shift(); // Garde les 20 derniers messages
        localStorage.setItem('iae_history', JSON.stringify(history));
    }

    async function handleChat() {
        const input = document.getElementById('userInput');
        const query = input.value.trim();
        const key = localStorage.getItem('iae_key');
        if (!query || !key) { if(!key) alert("Configurez votre Clé API."); return; }

        addMsg(query, 'user');
        input.value = '';
        setReadingMode(true);
        document.getElementById('loader').style.display = 'block';

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    system_instruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
                    contents: [{ role: "user", parts: [{ text: query }] }]
                })
            });
            const data = await response.json();
            document.getElementById('loader').style.display = 'none';
            addMsg(data.candidates[0].content.parts[0].text, 'bot');
        } catch (e) {
            document.getElementById('loader').style.display = 'none';
            addMsg("Erreur technique. Vérifiez votre connexion ou votre clé.", 'bot');
        }
    }

    function addMsg(text, side, save = true) {
        const div = document.createElement('div');
        div.className = `msg ${side}-msg`;
        div.innerHTML = side === 'bot' ? marked.parse(text) : text;
        document.getElementById('chat').appendChild(div);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        if(save) saveToHistory(text, side);
    }

    window.onload = loadHistory;
</script>
</body>
</html>
