<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Islam Agent Épistémique</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lato:wght@400;700&display=swap');
        
        :root {
            --bg-creme: #FFF2DF; 
            --orange-fonce: #E67E22;
            --vert-expert: #27ae60;
            --violet-spirituel: #8e44ad;
            --bleu-ciel: #3498DB;
            --noir: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg-creme);
            font-family: 'Lato', sans-serif;
            color: var(--noir);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--bg-creme);
            padding: 10px;
            z-index: 2000;
            border-bottom: 2px solid var(--orange-fonce);
            text-align: center;
        }

        .nav-buttons {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 600px; margin: 0 auto 10px; gap: 5px;
        }

        .btn {
            flex: 1; padding: 10px 5px; border-radius: 12px; border: none;
            color: white; font-weight: bold; font-size: 11px; cursor: pointer; text-transform: uppercase;
        }

        /* --- AVATAR & LOGO --- */
        .logo-box { width: 45px; height: 45px; border: 2px solid var(--vert-expert); border-radius: 50%; overflow: hidden; background: white; flex-shrink: 0; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        /* --- ZONE DE CONTENU --- */
        main { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; padding-bottom: 180px; }

        .msg { max-width: 90%; margin-bottom: 20px; padding: 15px; border-radius: 15px; background: white; border: 1px solid #ddd; line-height: 1.6; }
        .bot-msg { border-left: 5px solid var(--vert-expert); }
        .user-msg { align-self: flex-end; border-right: 5px solid var(--orange-fonce); background: #fffcf5; }

        /* --- FOOTER & FIX SAISIE --- */
        footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg-creme); padding: 10px; z-index: 3000;
            border-top: 2px solid var(--vert-expert);
        }

        .input-box { 
            display: flex; background: white; border: 2px solid var(--vert-expert); 
            border-radius: 30px; padding: 5px; align-items: center;
        }

        /* SUPPRESSION DU PARASITE (AUTOCOMPLETE) */
        #userInput { 
            flex: 1; border: none; outline: none; padding: 12px; font-size: 16px; 
            background: transparent; width: 100%;
        }

        /* --- MODALS --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        
        .profile-avatar-setup { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--vert-expert); margin: 0 auto 15px; position: relative; overflow: hidden; background: #eee; }
        .profile-avatar-setup img { width: 100%; height: 100%; object-fit: cover; }
        .profile-avatar-setup input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .form-group { margin-bottom: 10px; text-align: left; }
        .form-group label { font-size: 12px; font-weight: bold; color: #666; margin-left: 5px; }
        .form-group input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-top: 3px; }

        .loader { display: none; text-align: center; margin-bottom: 5px; }
        .dot { width: 8px; height: 8px; background: var(--vert-expert); border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite; margin: 0 2px; }
        @keyframes bounce { 0%, 100% { transform: scale(0.3); } 50% { transform: scale(1); } }
    </style>
</head>
<body>

<header>
    <div class="nav-buttons">
        <button class="btn" style="background:var(--vert-expert)" onclick="openModal('modal-dons')">Dons</button>
        <button class="btn" style="background:var(--orange-fonce)" onclick="setMode('quran')">Lecture</button>
        <div class="logo-box">
            <img id="main-avatar" src="https://via.placeholder.com/150">
        </div>
        <button class="btn" style="background:var(--bleu-ciel)" onclick="setMode('chat')">Agent</button>
        <button class="btn" style="background:var(--orange-fonce)" onclick="openModal('modal-profil')">Profil</button>
    </div>
    <div id="author-mini-info" style="font-size: 11px; color: var(--vert-expert); font-weight: bold;">
        Agent IAE - <span id="display-title">Expert</span>
    </div>
</header>

<main id="main-content">
    <div id="chat-ui"><div id="messages"></div></div>
    <div id="quran-ui" style="display:none;">
        <select id="surah-select" onchange="loadSurah()" style="width:100%; padding:10px; border-radius:10px; margin-bottom:10px;"></select>
        <div id="verses-container"></div>
    </div>
</main>

<footer>
    <div class="loader" id="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div id="agent-input-zone">
        <div class="input-box">
            <!-- TECHNIQUE ANTI-PARASITE : name aléatoire et autocomplete non-standard -->
            <input type="text" id="userInput" 
                   name="iae_query_field_unique" 
                   placeholder="Posez votre question..." 
                   autocomplete="off" 
                   role="presentation">
            <button onclick="askAgent()" style="border:none; background:none; padding:10px; cursor:pointer;">➔</button>
        </div>
    </div>
</footer>

<!-- MODAL PROFIL (COMPLÉTÉ) -->
<div id="modal-profil" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom:15px; color:var(--vert-expert);">Profil de l'Auteur</h3>
        
        <div class="profile-avatar-setup">
            <img id="profile-preview" src="https://via.placeholder.com/150">
            <input type="file" accept="image/*" onchange="uploadAvatar(event)">
        </div>
        <p style="font-size:10px; margin-bottom:15px;">Cliquez sur le cercle pour changer la photo</p>

        <div class="form-group">
            <label>Prénom</label>
            <input type="text" id="p-prenom" placeholder="Ex: Nana">
        </div>
        <div class="form-group">
            <label>Nom</label>
            <input type="text" id="p-nom" placeholder="Ex: Bawa">
        </div>
        <div class="form-group">
            <label>Titre / Fonction</label>
            <input type="text" id="p-titre" placeholder="Ex: Chercheur en Théologie">
        </div>
        <div class="form-group">
            <label>Clé API Gemini (Moteur IA)</label>
            <input type="password" id="p-key" placeholder="Collez votre clé ici" style="background:#fff9c4;">
        </div>

        <button onclick="saveProfile()" style="width:100%; padding:12px; background:var(--vert-expert); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px;">ENREGISTRER</button>
        <button onclick="closeModal('modal-profil')" style="width:100%; padding:10px; border:none; margin-top:5px; background:none;">Fermer</button>
    </div>
</div>

<div id="modal-dons" class="modal">
    <!-- Section Dons (Déjà optimisée précédemment) -->
    <div class="modal-content">
        <h3>Soutenir le projet</h3>
        <p><b>T-Money/Flooz :</b> +228 99 54 97 11</p>
        <button onclick="closeModal('modal-dons')" style="width:100%; padding:10px; border:none; margin-top:10px;">Fermer</button>
    </div>
</div>

<script>
/* --- BASE LOCALE --- */
const KNOWLEDGE_BASE = {
    "qui es-tu": "Je suis l'Agent Épistémique d'Afrique pour l'Islam. Mon rôle est de faciliter l'accès aux sciences islamiques.",
    "ton créateur": "J'ai été conçu pour servir la communauté des chercheurs et étudiants en théologie.",
    "salam": "Salam Alaykoum wa Rahmatoullah. Comment puis-je vous assister ?"
};

/* --- GESTION PROFIL & AVATAR --- */
function uploadAvatar(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('profile-preview').src = event.target.result;
            document.getElementById('main-avatar').src = event.target.result;
            localStorage.setItem('iae_avatar', event.target.result);
        };
        reader.readAsDataURL(file);
    }
}

function saveProfile() {
    localStorage.setItem('iae_prenom', document.getElementById('p-prenom').value);
    localStorage.setItem('iae_nom', document.getElementById('p-nom').value);
    localStorage.setItem('iae_titre', document.getElementById('p-titre').value);
    localStorage.setItem('iae_key', document.getElementById('p-key').value);
    
    updateDisplayInfo();
    alert("Profil mis à jour avec succès.");
    closeModal('modal-profil');
}

function updateDisplayInfo() {
    const titre = localStorage.getItem('iae_titre') || "Expert";
    document.getElementById('display-title').innerText = titre;
    if(localStorage.getItem('iae_avatar')) {
        const savedAvatar = localStorage.getItem('iae_avatar');
        document.getElementById('main-avatar').src = savedAvatar;
        document.getElementById('profile-preview').src = savedAvatar;
    }
}

/* --- LOGIQUE IA (Correction Gemini) --- */
async function askAgent() {
    const input = document.getElementById('userInput');
    const query = input.value.trim();
    if(!query) return;

    addMessage(query, 'user');
    input.value = '';
    document.getElementById('loader').style.display = 'block';

    // 1. Test Base Locale
    let localAns = KNOWLEDGE_BASE[query.toLowerCase()];
    if(localAns) {
        setTimeout(() => { addMessage(localAns, 'bot'); document.getElementById('loader').style.display = 'none'; }, 600);
        return;
    }

    // 2. Appel Gemini Flash 1.5
    const key = localStorage.getItem('iae_key');
    if(!key) {
        addMessage("⚠️ Clé API absente. Allez dans 'Profil' pour configurer votre clé gratuite Gemini.", 'bot');
        document.getElementById('loader').style.display = 'none';
        return;
    }

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: "Tu es un savant musulman africain expert. Réponds de façon académique et bienveillante en français à : " + query }] }]
            })
        });

        const data = await response.json();
        if(data.error) throw new Error(data.error.message);
        
        const botText = data.candidates[0].content.parts[0].text;
        addMessage(botText, 'bot');
    } catch (err) {
        addMessage("❌ Erreur IA : " + err.message + ". Vérifiez la validité de votre clé API dans le profil.", 'bot');
    }
    document.getElementById('loader').style.display = 'none';
}

function addMessage(text, side) {
    const div = document.createElement('div');
    div.className = `msg ${side}-msg`;
    div.innerHTML = side === 'bot' ? marked.parse(text) : text;
    document.getElementById('messages').appendChild(div);
    document.getElementById('main-content').scrollTop = document.getElementById('main-content').scrollHeight;
}

/* --- UTILITAIRES --- */
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function setMode(mode) {
    const isQ = (mode === 'quran');
    document.getElementById('chat-ui').style.display = isQ ? 'none' : 'block';
    document.getElementById('quran-ui').style.display = isQ ? 'block' : 'none';
}

window.onload = () => {
    // Charger les infos
    document.getElementById('p-prenom').value = localStorage.getItem('iae_prenom') || '';
    document.getElementById('p-nom').value = localStorage.getItem('iae_nom') || '';
    document.getElementById('p-titre').value = localStorage.getItem('iae_titre') || '';
    document.getElementById('p-key').value = localStorage.getItem('iae_key') || '';
    updateDisplayInfo();
    
    addMessage("Salam Alaykoum. Je suis votre Agent Épistémique. Comment puis-je vous aider ?", 'bot');
};
</script>
</body>
</html>
