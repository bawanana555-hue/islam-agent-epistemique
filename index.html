<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Islam Agent Épistémique</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#27ae60">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="IAE">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lato:wght@300;400;700&display=swap');
        :root {
            --bg-main: #FFEFD5;
            --orange-creme: #FFF5E1;
            --orange-clair: #FFB347;
            --orange-fonce: #E67E22;
            --vert-clair: #2ECC71;
            --bleu-ciel: #87CEEB;
            --violet-clair: #9B59B6;
            --text-main: #1a1a1a;
            --bordure-vert: 2px solid var(--vert-clair);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            background: var(--bg-main);
            font-family: 'Lato', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }

        /* --- Header --- */
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            background: var(--bg-main); padding: 12px 8px;
            z-index: 100; text-align: center;
        }
        .header-row { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 600px; margin: 0 auto; gap: 5px; }
        .welcome-area { margin-top: 8px; }
        .welcome-area h1 { font-family: 'Amiri', serif; color: #3498DB; font-size: 1.4em; }

        /* --- Logo --- */
        .logo-box {
            width: 45px; height: 45px; border: 2px solid var(--vert-clair);
            border-radius: 10px; background: white; overflow: hidden; cursor: pointer; position: relative;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .logo-box input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        /* --- Vues --- */
        #chat-view, #quran-view {
            flex: 1; margin-top: 145px; padding: 12px 10px 180px;
            overflow-y: auto; display: flex; flex-direction: column;
        }
        #quran-view { display: none; margin-top: 105px; padding-bottom: 220px; }

        /* --- Messages Chat --- */
        .msg {
            max-width: 96%; margin-bottom: 18px; padding: 18px;
            border-radius: 18px; font-size: 16px; line-height: 1.6;
            border: var(--bordure-vert); background: var(--orange-creme);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .user-msg { align-self: flex-end; border-color: var(--orange-clair); border-bottom-right-radius: 2px; }
        .bot-msg { align-self: flex-start; border-bottom-left-radius: 2px; text-align: justify; }
        .bot-msg h1, .bot-msg h2 { color: var(--vert-clair); font-family: 'Amiri', serif; margin: 10px 0; }

        /* --- Module Coran --- */
        .quran-header-tools { background: var(--orange-creme); padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
        .ayah-block { 
            background: white; margin-bottom: 15px; padding: 20px; 
            border-radius: 12px; border: 1px solid #eee; transition: 0.3s;
        }
        /* Style "Crayon" pour le suivi de lecture */
        .active-ayah { 
            border: 2px solid var(--orange-fonce); 
            background: #fff9c4 !important; 
            transform: scale(1.01);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .ar-txt { font-family: 'Amiri', serif; font-size: 26px; direction: rtl; display: block; margin-bottom: 12px; color: #2c3e50; line-height: 1.8; }
        .tr-txt { font-size: 14px; color: #555; display: block; margin-top: 6px; border-top: 1px solid #f0f0f0; padding-top: 4px; }

        .quran-footer {
            position: fixed; bottom: 85px; left: 0; right: 0;
            background: #fff; padding: 15px; border-top: 3px solid var(--vert-clair); z-index: 90;
        }

        /* --- UI Elements --- */
        .button-oval { padding: 8px 10px; border-radius: 20px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .input-wrapper { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-main); padding: 8px 10px 25px; }
        .input-area { display: flex; background: var(--orange-creme); border: var(--bordure-vert); border-radius: 30px; padding: 6px; max-width: 600px; margin: 0 auto; }
        .input-area input { flex: 1; border: none; background: transparent; outline: none; padding: 10px; font-size: 16px; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; position: relative; }
        
        .loader { display: none; margin: 10px 0; }
        .dot { width: 8px; height: 8px; background: var(--vert-clair); border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite; margin: 0 2px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body>

<div class="header">
    <div class="header-row">
        <button onclick="toggleModal('modal-dons',true)" class="button-oval" style="background:var(--vert-clair)">DONS</button>
        <button onclick="switchMode('quran')" class="button-oval" style="background:var(--orange-fonce)">📖 LECTURE</button>
        <div class="logo-box">
            <img id="logo-img" src="icons/icon-192.png" alt="Logo">
            <input type="file" accept="image/*" onchange="handleLogoUpload(event)">
        </div>
        <button onclick="switchMode('chat')" class="button-oval" style="background:var(--bleu-ciel)">💬 AGENT</button>
        <button onclick="toggleModal('modal-profil',true)" class="button-oval" style="background:var(--orange-clair)">PROFIL</button>
    </div>
    <div class="welcome-area">
        <h1 id="view-title">Islam Agent Épistémique</h1>
    </div>
</div>

<!-- VUE AGENT (CHAT ACADÉMIQUE) -->
<div id="chat-view">
    <div id="chat-messages"></div>
    <div class="loader" id="chat-loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<!-- VUE LECTURE CORANIQUE -->
<div id="quran-view">
    <div class="quran-header-tools">
        <select id="surah-select" onchange="loadSurah()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px;"></select>
    </div>
    <div id="quran-content"></div>
    
    <div class="quran-footer">
        <audio id="quran-audio" controls style="width: 100%;"></audio>
        <p style="font-size: 11px; text-align: center; color: #666; margin-top: 8px;">Suivi automatique (Crayon) activé</p>
    </div>
</div>

<!-- ZONE DE SAISIE AGENT -->
<div class="input-wrapper" id="input-chat-wrap">
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Posez votre question académique...">
        <button class="button-oval" style="background:var(--vert-clair); width:45px; height:45px; border-radius:50%; font-size:18px;" onclick="handleChat()">➔</button>
    </div>
</div>

<!-- MODAL PROFIL (CONFIGURATION GEMINI) -->
<div id="modal-profil" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--vert-clair); text-align:center; font-family:'Amiri', serif;">Profil & API</h2>
        <div style="margin-top:15px;">
            <label style="font-size:12px; font-weight:bold;">CLÉ API GEMINI (GRATUITE) :</label>
            <input type="password" id="profil-apikey" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-top:5px;" placeholder="Collez votre clé ici">
            <p style="font-size: 10px; color: #888; margin-top: 5px;">Obtenez-la sur : <b>aistudio.google.com</b></p>
        </div>
        <button onclick="saveProfile()" style="background:var(--vert-clair); color:white; border:none; width:100%; padding:12px; border-radius:8px; margin-top:20px; font-weight:bold; cursor:pointer;">ENREGISTRER</button>
        <button onclick="toggleModal('modal-profil',false)" style="background:#eee; border:none; width:100%; padding:10px; margin-top:10px; border-radius:8px; cursor:pointer;">FERMER</button>
    </div>
</div>

<!-- MODAL DONS -->
<div id="modal-dons" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--vert-clair); text-align:center;">Soutenir l'IAE</h2>
        <div style="margin:20px 0; font-size:14px; line-height:1.6;">
            <p><b>Paiement Local (Togo) :</b></p>
            <p>T-Money / Flooz : +228 99 54 97 11</p>
            <p>Nom : Nana Bawa Bouraima</p>
        </div>
        <button onclick="toggleModal('modal-dons',false)" style="background:var(--vert-clair); color:white; border:none; width:100%; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">FERMER</button>
    </div>
</div>

<script>
/* ============================================================
   LOGIQUE DE L'APPLICATION (UNIFIÉE)
   ============================================================ */

// 1. GESTION DES VUES
function switchMode(mode) {
    const chatV = document.getElementById('chat-view');
    const quranV = document.getElementById('quran-view');
    const inputW = document.getElementById('input-chat-wrap');
    const title = document.getElementById('view-title');

    if(mode === 'quran') {
        chatV.style.display = 'none';
        inputW.style.display = 'none';
        quranV.style.display = 'flex';
        title.innerText = "Lecture & Apprentissage";
        if(document.getElementById('surah-select').options.length === 0) fetchSurahs();
    } else {
        chatV.style.display = 'flex';
        inputW.style.display = 'block';
        quranV.style.display = 'none';
        title.innerText = "Islam Agent Épistémique";
    }
}

function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }

// 2. MOTEUR ACADÉMIQUE GEMINI
async function handleChat() {
    const input = document.getElementById('userInput');
    const q = input.value.trim();
    const key = localStorage.getItem('iae_api_key');

    if (!q) return;
    if (!key) { 
        alert("Action requise : Veuillez coller votre clé API Gemini dans le bouton PROFIL."); 
        toggleModal('modal-profil', true); 
        return; 
    }

    addMsg(q, 'user');
    input.value = '';
    document.getElementById('chat-loader').style.display = 'block';

    const promptSystem = "Tu es l'Islam Agent Épistémique. Ton style est académique, rigoureux et sourcé. Cite toujours le Coran et les Hadiths authentiques. Utilise des titres et des listes.";

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: promptSystem + "\n\nQuestion : " + q }] }]
            })
        });

        const data = await response.json();
        const answer = data.candidates[0].content.parts[0].text;
        
        document.getElementById('chat-loader').style.display = 'none';
        addMsg(answer, 'bot');
    } catch (e) {
        document.getElementById('chat-loader').style.display = 'none';
        addMsg("⚠️ Erreur : Impossible de joindre le moteur Gemini. Vérifiez votre clé API.", 'bot');
    }
}

function addMsg(t, s) {
    const d = document.createElement('div');
    d.className = 'msg ' + s + '-msg';
    d.innerHTML = s === 'bot' ? marked.parse(t) : t;
    document.getElementById('chat-messages').appendChild(d);
    document.getElementById('chat-view').scrollTop = document.getElementById('chat-view').scrollHeight;
}

// 3. MODULE CORAN (QURAN.COM API)
async function fetchSurahs() {
    try {
        const res = await fetch("https://api.quran.com/api/v4/chapters?language=fr");
        const data = await res.json();
        const select = document.getElementById('surah-select');
        data.chapters.forEach(s => {
            select.add(new Option(`${s.id}. ${s.name_simple} (${s.translated_name.name})`, s.id));
        });
        loadSurah();
    } catch(e) { console.error("Erreur sourates", e); }
}

let versesCache = [];
async function loadSurah() {
    const id = document.getElementById('surah-select').value;
    const content = document.getElementById('quran-content');
    content.innerHTML = "<p style='text-align:center; padding:20px;'>Préparation de la sourate...</p>";

    try {
        // Textes (FR=31, EN=131)
        const res = await fetch(`https://api.quran.com/api/v4/verses/by_chapter/${id}?language=fr&translations=31,131&fields=text_uthmani`);
        const data = await res.json();
        versesCache = data.verses;

        // Audio (Récitateur Al-Afasy)
        const audioRes = await fetch(`https://api.quran.com/api/v4/chapter_recitations/7/${id}`);
        const audioData = await audioRes.json();
        document.getElementById('quran-audio').src = audioData.audio_file.audio_url;

        content.innerHTML = versesCache.map((v, i) => `
            <div id="ayah-${i}" class="ayah-block">
                <span class="ar-txt">${v.text_uthmani}</span>
                <span class="tr-txt"><b>FR:</b> ${v.translations[0].text}</span>
                <span class="tr-txt"><b>EN:</b> ${v.translations[1].text}</span>
            </div>
        `).join('');
    } catch(e) { content.innerHTML = "Erreur de chargement des données."; }
}

// SUIVI DE LECTURE (CRAYON)
const audio = document.getElementById('quran-audio');
audio.ontimeupdate = () => {
    if (!versesCache.length) return;
    const index = Math.floor((audio.currentTime / audio.duration) * versesCache.length);
    document.querySelectorAll('.ayah-block').forEach(el => el.classList.remove('active-ayah'));
    const current = document.getElementById(`ayah-${index}`);
    if (current) {
        current.classList.add('active-ayah');
        current.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
};

// 4. PERSISTANCE (PROFIL & LOGO)
function saveProfile() {
    const k = document.getElementById('profil-apikey').value.trim();
    if (k) localStorage.setItem('iae_api_key', k);
    alert("Configuration sauvegardée !");
    toggleModal('modal-profil', false);
}

function handleLogoUpload(event) {
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
        document.getElementById('logo-img').src = e.target.result;
        localStorage.setItem('iae_logo', e.target.result);
    };
    reader.readAsDataURL(file);
}

window.onload = () => {
    const logo = localStorage.getItem('iae_logo');
    if (logo) document.getElementById('logo-img').src = logo;
    document.getElementById('profil-apikey').value = localStorage.getItem('iae_api_key') || '';
    document.getElementById('userInput').addEventListener('keydown', (e) => { if(e.key === 'Enter') handleChat(); });
};
</script>
</body>
</html>
