<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Islam Agent Épistémique</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#27ae60">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="IAE">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"><\/script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lato:wght@300;400;700&display=swap');
        :root{--bg-main:#FFEFD5;--orange-creme:#FFF5E1;--orange-clair:#FFB347;--orange-fonce:#E67E22;--vert-clair:#2ECC71;--bleu-ciel:#87CEEB;--text-main:#2C3E50;--bordure-vert:2px solid var(--vert-clair)}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
        body{background:var(--bg-main);font-family:'Lato',sans-serif;color:var(--text-main);display:flex;flex-direction:column;height:100dvh;overflow:hidden}
        .header{position:fixed;top:0;left:0;right:0;background:var(--bg-main);padding:15px 10px;z-index:100;text-align:center;transition:opacity .4s ease,transform .4s ease}
        .header-row{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:600px;margin:0 auto}
        .welcome-area{margin-top:10px}
        .welcome-area h1{font-family:'Amiri',serif;color:#3498DB;font-size:1.4em}
        .welcome-area .sub1{color:#8E44AD;font-size:1.1em;font-weight:bold;margin-top:5px}
        .welcome-area .sub2{color:#16A085;font-size:.9em;font-style:italic;margin-top:3px}
        .chat-container{flex:1;margin-top:160px;padding:20px 15px 180px;overflow-y:auto;display:flex;flex-direction:column}
        .msg{max-width:85%;margin-bottom:20px;padding:16px;border-radius:18px;font-size:16px;line-height:1.6;border:var(--bordure-vert);background:var(--orange-creme);box-shadow:2px 4px 15px rgba(0,0,0,.05)}
        .user-msg{align-self:flex-end;border-bottom-right-radius:2px;border-color:var(--orange-clair)}
        .bot-msg{align-self:flex-start;border-bottom-left-radius:2px}
        .bot-msg p{margin-bottom:15px;text-align:justify}
        .bot-msg h1,.bot-msg h2{color:var(--vert-clair);border-bottom:3px solid var(--orange-fonce);margin:15px 0 10px;font-family:'Amiri',serif}
        .bot-msg h1{font-size:1.5em}.bot-msg h2{font-size:1.2em}
        .bot-msg blockquote{border-left:5px solid var(--bleu-ciel);padding-left:15px;margin:15px 0;background:rgba(135,206,235,.1);font-style:italic}
        .typing{display:none;align-self:flex-start;padding:10px;margin-bottom:15px}
        .dot{width:10px;height:10px;margin:0 4px;border-radius:50%;display:inline-block;animation:bounce 1.4s infinite ease-in-out}
        .dot:nth-child(1){background:#E74C3C;animation-delay:-.32s}
        .dot:nth-child(2){background:#F1C40F;animation-delay:-.16s}
        .dot:nth-child(3){background:#2ECC71}
        @keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
        .donation-banner{text-align:center;font-size:.85em;font-weight:bold;height:20px;margin-bottom:5px}
        .blink{animation:blinker 4s linear infinite}
        @keyframes blinker{0%{opacity:0;color:var(--orange-fonce)}50%{opacity:1;color:var(--vert-clair)}100%{opacity:0;color:var(--orange-fonce)}}
        .input-wrapper{position:fixed;bottom:0;left:0;right:0;background:var(--bg-main);padding:10px 15px 25px}
        .input-area{display:flex;background:var(--orange-creme);border:var(--bordure-vert);border-radius:30px;padding:8px;max-width:600px;margin:0 auto}
        .input-area input{flex:1;border:none;background:transparent;outline:none;padding:10px;font-size:16px;color:var(--text-main)}
        .send-btn{background:var(--vert-clair);border:none;border-radius:50%;width:45px;height:45px;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;padding:20px}
        .modal-content{background:white;padding:25px;border-radius:15px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto}
        .button-oval{padding:8px 15px;border-radius:20px;border:none;color:white;font-weight:bold;cursor:pointer}
        .avatar-wrapper{text-align:center;margin:15px 0}
        .avatar-circle{width:90px;height:90px;border-radius:50%;border:3px solid var(--vert-clair);background:#f0f0f0;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:2.5em;color:#999;overflow:hidden}
        .profil-field{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:15px}
        .profil-field:focus{border-color:var(--vert-clair);outline:none}
        .profil-label{font-weight:bold;font-size:.9em;color:#555;margin-top:8px;display:block}
        .don-section{background:#f9f9f9;border-radius:10px;padding:12px;margin:10px 0;border-left:4px solid var(--vert-clair)}
        .don-section h3{font-size:1em;color:var(--orange-fonce);margin-bottom:8px}
        .don-section p{font-size:.9em;margin:4px 0;color:#444}
        .don-btn{display:block;width:100%;padding:12px;margin-top:8px;border:none;border-radius:8px;color:white;font-weight:bold;font-size:1em;cursor:pointer;text-decoration:none;text-align:center}
        .api-section{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:12px;margin-top:15px}
        .api-section h4{font-size:.9em;color:#856404;margin-bottom:8px}
        .api-hint{font-size:.75em;color:#856404;margin-top:4px}
        .reading-mode .header{opacity:0;pointer-events:none;transform:translateY(-20px)}
        .reading-mode .chat-container{margin-top:20px}
    </style>
</head>
<body>
<div class="header" id="main-header">
    <div class="header-row">
        <button onclick="toggleModal('modal-dons',true)" class="button-oval" style="background:var(--vert-clair)">DONS</button>
        <div style="width:50px;height:50px;border:2px solid var(--vert-clair);border-radius:10px;background:white;overflow:hidden">
            <img src="icons/icon-192.png" alt="Logo" style="width:100%;height:100%;object-fit:cover">
        </div>
        <button onclick="toggleModal('modal-profil',true)" class="button-oval" style="background:var(--orange-clair)">PROFIL</button>
    </div>
    <div class="welcome-area">
        <h1>Islam Agent Épistémique</h1>
        <div class="sub1">Bienvenue sur les pages de la théologie islamique</div>
        <div class="sub2">Je suis votre Premier Agent Épistémique d'Afrique pour l'islam</div>
    </div>
</div>
<div class="chat-container" id="chat"></div>
<div class="typing" id="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
<div class="input-wrapper">
    <div class="donation-banner"><span class="blink" id="blink-msg">Soutenir la connaissance est une aumône continue...</span></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Posez votre question ici..." onfocus="setReadingMode(true)">
        <button class="send-btn" onclick="handleChat()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<div id="modal-profil" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--vert-clair);text-align:center">👤 Profil de l'Auteur</h2>
        <div class="avatar-wrapper"><div class="avatar-circle" id="avatar-display">👤</div></div>
        <label class="profil-label">Nom</label>
        <input type="text" id="profil-nom" class="profil-field" placeholder="Votre nom de famille">
        <label class="profil-label">Prénom</label>
        <input type="text" id="profil-prenom" class="profil-field" placeholder="Votre prénom">
        <label class="profil-label">Titre</label>
        <input type="text" id="profil-titre" class="profil-field" placeholder="Ex: Fondateur & Développeur IAE">
        <div class="api-section">
            <h4>🔑 Clé API (Configuration)</h4>
            <input type="password" id="profil-apikey" class="profil-field" placeholder="Collez votre clé API CodeWords ici">
            <p class="api-hint">Obtenez votre clé sur : codewords.agemo.ai/account/keys</p>
        </div>
        <button onclick="saveProfile()" style="background:var(--vert-clair);color:white;border:none;width:100%;padding:12px;border-radius:8px;cursor:pointer;font-weight:bold;margin-top:15px">ENREGISTRER</button>
        <button onclick="toggleModal('modal-profil',false)" style="background:#eee;border:none;width:100%;padding:10px;margin-top:8px;border-radius:8px;cursor:pointer">FERMER</button>
    </div>
</div>

<div id="modal-dons" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--vert-clair);text-align:center">💳 Soutenir l'Agent</h2>
        <p style="text-align:center;font-size:.85em;color:#777;margin:8px 0 15px">Vos dons volontaires permettent de maintenir ce service gratuit pour tous.</p>
        <div class="don-section">
            <h3>🇹🇬 Paiement Local</h3>
            <p><strong>T-Money :</strong> +228 99-54-97-11</p>
            <p><strong>Flooz :</strong> +228 99-54-97-11</p>
            <p style="font-size:.8em;color:#888">Nom : Nana Bawa Bouraima</p>
        </div>
        <div class="don-section">
            <h3>🌍 Paiement International</h3>
            <p><strong>Western Union / MoneyGram</strong></p>
            <p>Bénéficiaire : <strong>Nana Bawa Bouraima</strong></p>
            <p>Ville : <strong>Lomé</strong> — Pays : <strong>Togo</strong></p>
            <p>Tél : +228 99-54-97-11</p>
        </div>
        <div class="don-section">
            <h3>💳 Paiement en Ligne</h3>
            <a href="https://cinetpay.com" target="_blank" class="don-btn" style="background:var(--orange-fonce)">Payer via CinetPay →</a>
        </div>
        <p style="text-align:center;font-size:.8em;color:#888;margin-top:10px">📧 Contact : bawanana555@gmail.com</p>
        <button onclick="toggleModal('modal-dons',false)" style="background:var(--vert-clair);color:white;border:none;width:100%;padding:12px;margin-top:12px;border-radius:8px;cursor:pointer;font-weight:bold">FERMER</button>
    </div>
</div>

<script>
const IAE_API_URL="https://runtime.codewords.ai/run/iae_gemini_proxy_c3d3a092";
const blinkMessages=["Soutenir la connaissance est une aumône continue...","Contribuez à l'éveil de l'Agent par vos dons volontaires."];
let msgIdx=0;
setInterval(()=>{msgIdx=(msgIdx+1)%blinkMessages.length;document.getElementById('blink-msg').innerText=blinkMessages[msgIdx]},4000);

function setReadingMode(a){if(a)document.body.classList.add('reading-mode')}
function toggleModal(id,show){document.getElementById(id).style.display=show?'flex':'none';if(show&&id==='modal-profil')loadProfile()}

function saveProfile(){
    const p={nom:document.getElementById('profil-nom').value.trim(),prenom:document.getElementById('profil-prenom').value.trim(),titre:document.getElementById('profil-titre').value.trim()};
    localStorage.setItem('iae_profil',JSON.stringify(p));
    const k=document.getElementById('profil-apikey').value.trim();
    if(k)localStorage.setItem('iae_api_key',k);
    alert("Profil et configuration enregistrés !");
    toggleModal('modal-profil',false);
}
function loadProfile(){
    const p=JSON.parse(localStorage.getItem('iae_profil')||'{}');
    document.getElementById('profil-nom').value=p.nom||'';
    document.getElementById('profil-prenom').value=p.prenom||'';
    document.getElementById('profil-titre').value=p.titre||'';
    document.getElementById('profil-apikey').value=localStorage.getItem('iae_api_key')||'';
}
function getApiKey(){return localStorage.getItem('iae_api_key')||''}

function loadHistory(){const h=JSON.parse(localStorage.getItem('iae_history')||'[]');h.forEach(m=>addMsg(m.text,m.side,false))}
function saveToHistory(t,s){let h=JSON.parse(localStorage.getItem('iae_history')||'[]');h.push({text:t,side:s});if(h.length>20)h.shift();localStorage.setItem('iae_history',JSON.stringify(h))}

async function handleChat(){
    const input=document.getElementById('userInput');
    const q=input.value.trim();
    if(!q)return;
    const k=getApiKey();
    if(!k){alert("Configurez votre clé API dans le bouton PROFIL.");toggleModal('modal-profil',true);return}
    addMsg(q,'user');input.value='';setReadingMode(true);
    document.getElementById('loader').style.display='block';
    try{
        const r=await fetch(IAE_API_URL,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+k},body:JSON.stringify({question:q})});
        if(!r.ok)throw new Error("Erreur "+r.status);
        const d=await r.json();
        document.getElementById('loader').style.display='none';
        addMsg(d.answer,'bot');
    }catch(e){
        document.getElementById('loader').style.display='none';
        addMsg("Erreur technique. Vérifiez votre connexion et votre clé API.",'bot');
        console.error("IAE:",e);
    }
}

function addMsg(t,s,save=true){
    const d=document.createElement('div');d.className='msg '+s+'-msg';
    d.innerHTML=s==='bot'?marked.parse(t):t;
    document.getElementById('chat').appendChild(d);
    document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
    if(save)saveToHistory(t,s);
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement.id==='userInput')handleChat()});
window.onload=function(){loadHistory();if(!getApiKey())setTimeout(()=>toggleModal('modal-profil',true),1500)};
<\/script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js').then(()=>console.log('SW OK')).catch(e=>console.log('SW err:',e))}
<\/script>
</body>
</html>
